<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pictionary Slideshow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: white;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            transition: transform 0.2s;
            position: relative;
        }

        .phrase-text {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #2d3748;
            line-height: 1.3;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button.next {
            background-color: #48bb78;
            color: white;
        }

        button.next:hover {
            background-color: #38a169;
            transform: translateY(-2px);
        }

        button.reset {
            background-color: #f56565;
            color: white;
        }

        button.reset:hover {
            background-color: #e53e3e;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        .counter {
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0.8;
        }

        /* Animation for drawing a new card */
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PICTIONARY</h1>
        
        <div class="card" id="card">
            <div class="phrase-text" id="phrase-display">Ready to draw?</div>
        </div>

        <div class="controls">
            <button class="next" id="next-btn" onclick="nextPhrase()">Next Phrase</button>
            <button class="reset" id="reset-btn" onclick="resetGame()">Reset Game</button>
        </div>

        <div class="counter" id="counter">Phrases left: 0</div>
    </div>

    <script>
        const allPhrases = [
            "Monkey eating pizza",
            "Dog wearing sunglasses",
            "Cat stuck in a box",
            "Banana slipping on a person",
            "Dinosaur riding a bicycle",
            "Chicken playing video games",
            "Elephant dancing ballet",
            "Penguin holding an ice cream",
            "Fish driving a car",
            "Cow jumping on a trampoline",
            "Alien drinking coffee",
            "Robot brushing its teeth",
            "Pirate taking a selfie",
            "Ghost eating a sandwich",
            "Shark wearing a hat",
            "Frog singing on stage",
            "Bear hugging a tree",
            "Spider cooking pasta",
            "Turtle racing a rabbit",
            "Snake wearing shoes",
            "Wizard using a laptop",
            "Superhero stuck in traffic",
            "Knight riding a skateboard",
            "Princess eating a burger",
            "Vampire brushing teeth",
            "Zombie at a birthday party",
            "Dragon blowing bubbles",
            "Unicorn stuck in traffic",
            "Mermaid using a phone",
            "Giant stepping on a LEGO",
            "Baby lifting weights",
            "Teacher sleeping in class",
            "Kid walking a dinosaur",
            "Chef burning toast",
            "Person slipping on soap",
            "Man juggling chickens",
            "Woman chasing a balloon",
            "Person hugging a cactus",
            "Kid flying with balloons",
            "Family of ducks watching TV"
        ];

        let availablePhrases = [];
        const display = document.getElementById('phrase-display');
        const counter = document.getElementById('counter');
        const nextBtn = document.getElementById('next-btn');

        // Initialize game on page load
        function initGame() {
            const savedPhrases = localStorage.getItem('pictionary_phrases');
            
            if (savedPhrases) {
                availablePhrases = JSON.parse(savedPhrases);
            } else {
                availablePhrases = [...allPhrases];
            }
            
            updateCounter();
            
            if (availablePhrases.length === 0) {
                display.innerHTML = "🎉<br>Game Over!<br>All phrases used.";
                nextBtn.disabled = true;
                nextBtn.style.opacity = '0.5';
                nextBtn.style.cursor = 'not-allowed';
            } else {
                display.textContent = "Click 'Next Phrase' to start!";
            }
        }

        // Fetch the next random phrase
        function nextPhrase() {
            if (availablePhrases.length === 0) return;

            // Pick a random index
            const randomIndex = Math.floor(Math.random() * availablePhrases.length);
            const selectedPhrase = availablePhrases[randomIndex];

            // Remove phrase from available list
            availablePhrases.splice(randomIndex, 1);

            // Save new state to local storage
            localStorage.setItem('pictionary_phrases', JSON.stringify(availablePhrases));

            // Animate text
            display.classList.remove('animate-pop');
            void display.offsetWidth; // Trigger reflow to restart animation
            display.classList.add('animate-pop');

            // Display text
            display.textContent = selectedPhrase;

            updateCounter();

            // Check if game over
            if (availablePhrases.length === 0) {
                nextBtn.disabled = true;
                nextBtn.style.opacity = '0.5';
                nextBtn.style.cursor = 'not-allowed';
                setTimeout(() => {
                    display.innerHTML = "🎉<br>That was the last one!";
                }, 2000);
            }
        }

        // Reset the game completely
        function resetGame() {
            if (confirm("Are you sure you want to reset? This will put all phrases back in the mix.")) {
                availablePhrases = [...allPhrases];
                localStorage.setItem('pictionary_phrases', JSON.stringify(availablePhrases));
                
                display.textContent = "Game Reset! Click 'Next Phrase' to start.";
                
                // Re-enable next button
                nextBtn.disabled = false;
                nextBtn.style.opacity = '1';
                nextBtn.style.cursor = 'pointer';
                
                updateCounter();
            }
        }

        // Update the visual counter
        function updateCounter() {
            counter.textContent = `Phrases left: ${availablePhrases.length} / ${allPhrases.length}`;
        }

        // Start everything up
        window.onload = initGame;
    </script>
</body>
</html>
